# PowerShell lint (CI test).
# Runs PSScriptAnalyzer over the repository's PowerShell so every push and pull
# request is checked before merge. Provides a real CI test signal (OpenSSF
# Scorecard CI-Tests) and catches script defects in the deploy tooling.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer found $($results.Count) error-level finding(s)."
          }
          Write-Host "PSScriptAnalyzer: no error-level findings."
